name: Build Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run tauri build

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./src-tauri/tauri.conf.json').version")" >> $env:GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: sumbody v${{ steps.version.outputs.version }}
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
            src-tauri/target/release/sumbody.exe
          draft: false
          prerelease: false

      - name: Generate latest.json for updater
        run: |
          $version = node -p "require('./src-tauri/tauri.conf.json').version"
          $sigFile = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.nsis.zip.sig" -ErrorAction SilentlyContinue | Select-Object -First 1
          $sig = if ($sigFile) { Get-Content $sigFile.FullName -Raw } else { "" }
          $json = @{
            version = "v$version"
            notes = "Update to v$version"
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $sig.Trim()
                url = "https://github.com/osbins/sumbody/releases/download/v$version/SumBody_${version}_x64-setup.nsis.zip"
              }
            }
          }
          $json | ConvertTo-Json -Depth 4 | Out-File -FilePath latest.json -Encoding utf8
          Write-Host "Signature: $($sig.Substring(0, [Math]::Min(50, $sig.Length)))..."

      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: latest.json
