name: Build Windows Installer

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run tauri build

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./src-tauri/tauri.conf.json').version")" >> $env:GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build.${{ github.run_number }}
          name: sumbody v${{ steps.version.outputs.version }} (Build ${{ github.run_number }})
          files: src-tauri/target/release/bundle/nsis/*.exe
          draft: false
          prerelease: false
